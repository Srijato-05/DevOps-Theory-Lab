version: '3.9'

services:
  db:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: advanced_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: webapp_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      backend_macvlan:
        ipv4_address: 192.168.1.100  # Adjust as needed for your subnet
      internal_net:
        aliases:
          - db_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d webapp_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: advanced_fastapi
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: webapp_db
      POSTGRES_HOST: db_internal
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    networks:
      backend_macvlan:
        ipv4_address: 192.168.1.101  # Adjust as needed for your subnet
      internal_net:
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    ports:
      - "8000:8000"

volumes:
  pgdata:
    name: advanced_pgdata

networks:
  internal_net:
  backend_macvlan:
    external: true
    name: backend_macvlan
