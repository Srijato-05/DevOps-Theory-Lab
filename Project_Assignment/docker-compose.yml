version: '3.9'

services:
  db:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: advanced_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      internal_net:
        aliases:
          - db_internal
      ipvlan_net:
        ipv4_address: 192.168.3.20
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d webapp_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: advanced_fastapi
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: db_internal
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      internal_net:
        aliases:
          - api_internal
      ipvlan_net:
        ipv4_address: 192.168.3.21
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    ports:
      - "8001:8000"

  redis:
    image: redis:7-alpine
    container_name: advanced_redis
    restart: always
    networks:
      internal_net:
        aliases:
          - redis
      ipvlan_net:
        ipv4_address: 192.168.3.22
    ports:
      - "6380:6379"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: advanced_web_portal
    restart: always
    depends_on:
      api:
        condition: service_healthy
    networks:
      internal_net:
      ipvlan_net:
        ipv4_address: 192.168.3.23
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    ports:
      - "8081:80"

volumes:
  pgdata:
    name: advanced_pgdata

networks:
  internal_net:
    driver: bridge
  ipvlan_net:
    driver: ipvlan
    driver_opts:
      ipvlan_mode: l2
      parent: eth0
    ipam:
      config:
        - subnet: 192.168.3.0/24
          gateway: 192.168.3.1
